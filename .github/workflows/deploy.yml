name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify CNAME exists in output
        run: |
          if [ ! -f docs/CNAME ]; then
            echo "ERROR: CNAME file missing from docs/"
            exit 1
          fi
          echo "CNAME contents: $(cat docs/CNAME)"

      - name: Verify .nojekyll exists in output
        run: |
          if [ ! -f docs/.nojekyll ]; then
            echo "ERROR: .nojekyll file missing from docs/"
            exit 1
          fi

      - name: Commit and push docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: build and deploy site"
          git push
